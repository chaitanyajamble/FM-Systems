name: CI
 
# Runs on every push and pull request that touches app code, so broken
# code never reaches the deploy workflow (which only builds/deploys images
# that already exist on `main`, it does not re-run these checks).
on:
  push:
    branches: ["**"]
    paths:
      - "app/**"
      - "tests/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
 
# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
 
permissions:
  contents: read
 
jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
 
      - name: Install lint dependencies
        run: pip install ruff==0.6.9
 
      - name: Run ruff
        run: ruff check app tests
 
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
 
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
 
      - name: Run tests
        env:
          # Dummy key so app startup / dependency injection succeeds;
          # tests avoid making real OpenAI calls.
          OPENAI_API_KEY: test-key-for-ci
        run: pytest tests/ -v --junitxml=test-results.xml
 
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
 
  docker-build-check:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fmsystems-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
name: CD
 
# Deploys on every push to main (after CI has already run on that commit
# via the branch push trigger) plus manual runs against a chosen environment.
on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: ["staging", "production"]
 
concurrency:
  group: cd-${{ inputs.environment || 'staging' }}
  cancel-in-progress: false # never cancel a deploy mid-flight
 
permissions:
  contents: read
  packages: write
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
 
jobs:
  # Re-run the same gate CI already ran, so a manual dispatch against an
  # arbitrary ref can never skip tests before deploying.
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests
      - env:
          OPENAI_API_KEY: test-key-for-ci
        run: pytest tests/ -v
 
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
  deploy:
    name: Deploy to ${{ inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'staging' }} # gate with GitHub Environment protection rules
    steps:
      - uses: actions/checkout@v4
 
      - name: Copy deployment files to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/fmsystems-backend/"
 
      - name: Pull image and restart the service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/fmsystems-backend
 
            export IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            export OPENAI_MODEL="${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}"
            export APP_ENV="${{ inputs.environment || 'staging' }}"
 
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
 
      - name: Verify health endpoint
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            for i in {1..10}; do
              if curl -fsS http://localhost:8000/health; then
                echo "Deployment healthy."
                exit 0
              fi
              echo "Waiting for service to become healthy... ($i/10)"
              sleep 3
            done
            echo "Service did not become healthy in time." >&2
            exit 1name: CD
 
